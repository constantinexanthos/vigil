name: Daemon CI

on:
  push:
    branches: [main]
    paths: ["daemon/**", ".github/workflows/daemon-ci.yml"]
  pull_request:
    paths: ["daemon/**", ".github/workflows/daemon-ci.yml"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: cargo-${{ runner.os }}-${{ hashFiles('daemon/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test
