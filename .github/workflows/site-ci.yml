name: Site CI

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/site-ci.yml"]
  pull_request:
    paths: ["site/**", ".github/workflows/site-ci.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
