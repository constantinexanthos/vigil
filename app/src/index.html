<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vigil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 16px;
      font-size: 13px;
    }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #fff; }
    .section { margin-bottom: 16px; }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 6px; }
    .placeholder { color: #666; font-style: italic; }
  </style>
</head>
<body>
  <h1>Vigil</h1>
  <div class="section">
    <div class="section-title">Status</div>
    <div class="placeholder">Dashboard UI coming soon.</div>
  </div>
  <div class="section">
    <div class="section-title">Active Agents</div>
    <div id="agents" class="placeholder">Loading...</div>
  </div>
  <div class="section">
    <div class="section-title">Events Today</div>
    <div id="count" class="placeholder">Loading...</div>
  </div>
  <script>
    async function init() {
      if (!window.__TAURI__) return;
      const { invoke } = window.__TAURI__.core;
      try {
        const agents = await invoke('get_active_agents');
        document.getElementById('agents').textContent = agents.length ? agents.join(', ') : 'None detected';
        document.getElementById('agents').classList.toggle('placeholder', agents.length === 0);
      } catch (e) {
        document.getElementById('agents').textContent = 'No database';
      }
      try {
        const count = await invoke('get_event_count');
        document.getElementById('count').textContent = count.toString();
        document.getElementById('count').classList.remove('placeholder');
      } catch (e) {
        document.getElementById('count').textContent = 'No database';
      }
    }
    init();
  </script>
</body>
</html>
